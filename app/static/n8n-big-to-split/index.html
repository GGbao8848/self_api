<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>n8n 大图流程最小面板</title>
  <style>
    :root { --bg:#0f1218; --panel:#171d28; --text:#e8eaef; --muted:#8b95a5; --border:#2a3140; --accent:#3b82f6; --ok:#22c55e; --err:#f87171; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}
    .wrap{max-width:760px;margin:0 auto;padding:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
    h1{font-size:20px;margin:0 0 8px} h2{font-size:14px;margin:0 0 10px;color:var(--muted)}
    .muted{color:var(--muted);font-size:13px}
    label{display:block;color:var(--muted);font-size:12px;margin:8px 0 4px}
    input,textarea{width:100%;background:#0d121b;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px}
    textarea{min-height:58px;font-family:ui-monospace,monospace;font-size:12px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{border:0;border-radius:8px;padding:9px 12px;background:var(--accent);color:white;cursor:pointer}
    button.alt{background:transparent;border:1px solid var(--border);color:var(--text)}
    .status{padding:10px;border-radius:8px;background:#0d121b;border:1px solid var(--border);white-space:pre-wrap;font-size:12px;word-break:break-all}
    .ok{border-color:color-mix(in srgb,var(--ok) 45%, var(--border))}
    .bad{border-color:color-mix(in srgb,var(--err) 45%, var(--border))}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>n8n 大图流程最小面板</h1>
    <div class="muted">流程含两次审核：启动后返回第一次链接；第一次审核通过后返回第二次链接。</div>

    <div class="card">
      <h2>1) 启动</h2>
      <div class="row">
        <div>
          <label>n8n 根地址</label>
          <input id="n8nBase" type="url" value="http://192.168.2.26:5678" />
        </div>
        <div>
          <label>Webhook 模式</label>
          <select id="mode" style="width:100%;background:#0d121b;color:#e8eaef;border:1px solid #2a3140;border-radius:8px;padding:10px">
            <option value="webhook">webhook</option>
            <option value="webhook-test">webhook-test</option>
          </select>
        </div>
      </div>
      <label>original_dataset（必填）</label>
      <input id="originalDataset" type="text" placeholder="/path/to/dataset" />
      <label>dataset_name（可选）</label>
      <input id="datasetName" type="text" placeholder="可留空" />
      <div class="actions">
        <button id="btnStart" type="button">启动工作流</button>
        <button id="btnExec" class="alt" type="button">打开 n8n 执行列表</button>
      </div>
      <div id="startOut" class="status" style="display:none"></div>
    </div>

    <div class="card">
      <h2>2) 审核</h2>
      <label>当前审核 URL（执行按钮会优先用这个）</label>
      <textarea id="resumeUrl" placeholder="启动后自动回填"></textarea>
      <label>第二次审核 URL（滑窗后）</label>
      <textarea id="resumeUrl2" placeholder="第一次审核通过后自动回填"></textarea>
      <div class="actions">
        <button id="btnApprove" type="button">执行当前审核（GET）</button>
        <button id="btnOpen" class="alt" type="button">仅新标签页打开当前 URL</button>
      </div>
      <div id="approveOut" class="status" style="display:none"></div>
    </div>
  </div>

<script>
const DEFAULT_BASE='http://192.168.2.26:5678';
const LS_BASE='n8n_big_split_base';
const LS_MODE='n8n_big_split_mode';

const $=id=>document.getElementById(id);
const show=(id,text,ok)=>{ const el=$(id); el.style.display='block'; el.textContent=text; el.classList.remove('ok','bad'); el.classList.add(ok?'ok':'bad'); };
function norm(u){
  let v=String(u||'').trim().replace(/\/+$/,'');
  if (!v) return v;
  if (!/^https?:\/\//i.test(v)) v = `http://${v}`;
  return v;
}

(function init(){
  $('n8nBase').value=localStorage.getItem(LS_BASE)||DEFAULT_BASE;
  $('mode').value=localStorage.getItem(LS_MODE)||'webhook';
})();

function webhookUrl(){
  const base=norm($('n8nBase').value);
  if(!base) throw new Error('请填写 n8n 根地址');
  return `${base}/${$('mode').value}/self-api-big-to-split`;
}

$('btnStart').addEventListener('click', async()=>{
  const original_dataset=$('originalDataset').value.trim();
  if(!original_dataset){ show('startOut','错误：请填写 original_dataset',false); return; }
  const dataset_name=$('datasetName').value.trim();
  const body={original_dataset}; if(dataset_name) body.dataset_name=dataset_name;

  localStorage.setItem(LS_BASE, norm($('n8nBase').value));
  localStorage.setItem(LS_MODE, $('mode').value);

  let url='';
  try{ url=webhookUrl(); }catch(e){ show('startOut',String(e.message||e),false); return; }

  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const text=await res.text();
    let parsed=null; try{ parsed=text?JSON.parse(text):null; }catch(_){ }

    if(parsed?.approve_resume_url) $('resumeUrl').value=parsed.approve_resume_url;
    if(parsed?.approve_resume_url_after_sliding) $('resumeUrl2').value=parsed.approve_resume_url_after_sliding;

    const msg=parsed
      ? `HTTP ${res.status} ${res.statusText}
请求URL: ${url}
first_url: ${parsed.approve_resume_url||''}
second_url: ${parsed.approve_resume_url_after_sliding||''}
payload:
${JSON.stringify(parsed,null,2)}`
      : (text.trim()
          ? `HTTP ${res.status} ${res.statusText}
请求URL: ${url}
${text}`
          : `HTTP ${res.status} ${res.statusText}
请求URL: ${url}
响应体为空：通常表示工作流已触发，但 n8n 端仍是即时响应模式。请到 Executions 确认是否已启动。`);
    show('startOut',msg,res.ok);
  }catch(err){
    show('startOut',`请求失败：${err}`,false);
  }
});

$('btnApprove').addEventListener('click', async()=>{
  const current=$('resumeUrl').value.trim();
  if(!current){ show('approveOut','请先提供当前审核 URL',false); return; }
  try{
    const res=await fetch(current,{method:'GET',mode:'cors',credentials:'omit'});
    const text=await res.text();
    let parsed=null; try{ parsed=text?JSON.parse(text):null; }catch(_){ }

    if(parsed?.approve_resume_url_after_sliding){
      $('resumeUrl2').value=parsed.approve_resume_url_after_sliding;
      $('resumeUrl').value=parsed.approve_resume_url_after_sliding;
    }

    const msg=parsed
      ? `HTTP ${res.status}
${JSON.stringify(parsed,null,2)}${parsed?.approve_resume_url_after_sliding?'

已自动切换到第二次审核 URL':''}`
      : `HTTP ${res.status}
${text.slice(0,2000)}`;
    show('approveOut',msg,res.ok);
  }catch(err){
    show('approveOut',`fetch 失败（可能 CORS）：${err}`,false);
  }
});

$('btnOpen').addEventListener('click',()=>{
  const raw=$('resumeUrl').value.trim();
  if(!raw){ show('approveOut','请先提供当前审核 URL',false); return; }
  try{ const u=new URL(raw); window.open(u.toString(),'_blank','noopener,noreferrer'); show('approveOut',`已打开：
${u}`,true); }
  catch(e){ show('approveOut',`URL 无效：${e}`,false); }
});

$('btnExec').addEventListener('click',()=>{
  const base=norm($('n8nBase').value);
  if(!base){ show('startOut','请先填写 n8n 根地址',false); return; }
  window.open(`${base}/home/executions`,'_blank','noopener,noreferrer');
});
</script>
</body>
</html>
